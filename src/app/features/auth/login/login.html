<div class="fixed inset-0 bg-linear-to-br from-indigo-500 via-purple-500 to-pink-500 overflow-hidden">
  <div class="h-full flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">

      <!-- Header - Compact -->
      <div class="text-center pt-8 pb-4 px-8">
        <div class="text-4xl mb-2">🛍️</div>
        <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
        <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
      </div>

      <!-- Form - Compact spacing -->
      <form (ngSubmit)="onSubmit()" class="px-8">
        <!-- Email Field -->
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input type="email" id="email" name="email" [(ngModel)]="email" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 outline-none text-sm"
            placeholder="Enter your email" autocomplete="email" />
        </div>

        <!-- Password Field -->
        <div class="mb-4">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" [(ngModel)]="password" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 outline-none text-sm"
            placeholder="Enter your password" autocomplete="current-password" />
        </div>

        <!-- Options - Compact -->
        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center cursor-pointer">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe"
              class="w-3.5 h-3.5 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" />
            <span class="ml-2 text-xs text-gray-600">Remember me</span>
          </label>
          <a routerLink="/forgot-password"
            class="text-xs text-indigo-600 hover:text-indigo-700 hover:underline transition-all">
            Forgot Password?
          </a>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="authService.loading()"
          class="w-full bg-linear-to-r from-indigo-600 to-purple-600 text-white font-semibold py-2.5 rounded-lg hover:from-indigo-700 hover:to-purple-700 transition-all duration-200 transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 text-sm">
          <span *ngIf="!authService.loading()">Sign In</span>
          <span *ngIf="authService.loading()" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            Signing in...
          </span>
        </button>

        <!-- Divider - Compact -->
        <div class="relative my-5">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-xs">
            <span class="px-3 bg-white text-gray-500">or continue with</span>
          </div>
        </div>

        <!-- Google Sign In - Compact -->
        <button type="button" (click)="googleSignIn()" [disabled]="authService.loading()"
          class="w-full bg-white border-2 border-gray-300 text-gray-700 font-semibold py-2.5 rounded-lg hover:bg-gray-50 hover:border-gray-400 transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Continue with Google
        </button>
      </form>

      <!-- Register Link - Compact -->
      <div class="text-center py-6">
        <p class="text-xs text-gray-600">
          Don't have an account?
          <a routerLink="/register" class="text-indigo-600 hover:text-indigo-700 font-semibold hover:underline ml-1">
            Create Account
          </a>
        </p>
      </div>

      <!-- Messages -->
       @if((errorMessage())){
           <div class="mx-8 mb-6 p-2.5 bg-red-50 border border-red-200 rounded-lg animate-shake">
        <p class="text-red-600 text-xs text-center">{{ errorMessage() }}</p>
      </div>
       }
      @if((successMessage())){  
          <div  class="mx-8 mb-6 p-2.5 bg-green-50 border border-green-200 rounded-lg">
        <p class="text-green-600 text-xs text-center">{{ successMessage() }}</p>
      </div>

    }
    </div>

  </div>
</div>
